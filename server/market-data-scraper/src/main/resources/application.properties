server.port=8080
spring.application.name=market-data-scraper

# Scraper timeouts
scraper.connect-timeout-ms=3000
scraper.read-timeout-ms=5000
scraper.user-agent-rotate=true
scraper.rate-limit-delay-min-ms=500
scraper.rate-limit-delay-max-ms=1500

# Cache TTLs
cache.quote.ttl-seconds=60
cache.options.ttl-seconds=120
cache.short.ttl-seconds=3600
cache.news.ttl-seconds=180

# Logging
logging.level.com.trading.marketdata.scraper=DEBUG
logging.level.com.trading.marketdata.service=INFO

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# Springdoc / Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.try-it-out-enabled=true

# Virtual threads (Java 21 + Spring Boot 3.2+)
spring.threads.virtual.enabled=true

# IBKR / IB Gateway
ibkr.host=127.0.0.1
ibkr.port=4001
ibkr.client-id=1
ibkr.connect-timeout-ms=5000
