server.port=8080
spring.application.name=market-data-scraper

# Scraper timeouts
scraper.connect-timeout-ms=3000
scraper.read-timeout-ms=5000
scraper.user-agent-rotate=true
scraper.rate-limit-delay-min-ms=500
scraper.rate-limit-delay-max-ms=1500

# Cache TTLs
cache.quote.ttl-seconds=60
cache.options.ttl-seconds=120
cache.short.ttl-seconds=3600
cache.news.ttl-seconds=180
# conId is static per symbol - long TTL just to allow eventual self-healing
cache.ibkr-conid.ttl-seconds=604800
# Option chain (strikes/expiries) - rarely changes intraday
cache.option-chain.ttl-seconds=43200
# Open interest is published once/day before market open, does not update intraday
cache.option-oi.ttl-seconds=14400
# How long to remember a confirmed-invalid strike/expiry/right combo (IBKR error 200) before
# asking again — see OptionActivityService
cache.invalid-contract.ttl-seconds=3600

# Unusual options activity (computed from IBKR structured data, see OptionActivityService)
# How many strikes nearest the current price to check (both calls and puts, so actual
# request count per scan = nearest-strikes * expiries * 2)
unusual-activity.nearest-strikes=16
# How many extra candidate strikes (beyond nearest-strikes) to pull before giving up — not
# every strike in the aggregate chain is actually listed for the nearest expiry (confirmed
# live: strikes only valid for other expirations get rejected with IBKR error 200), so this
# compensates by trying further candidates until nearest-strikes actually resolve
unusual-activity.strike-oversample-factor=3
# How many of the soonest expiries to include
unusual-activity.expiries=2
# Flag a contract when today's volume / open interest exceeds this ratio
unusual-activity.min-volume-oi-ratio=1.0
# Minimum strike-referenced notional (volume * strike * 100, in USD) for a contract to be
# flagged as unusual. Filters ratio-only noise on illiquid contracts: a low-OI strike lets a
# handful of lots produce a high vol/OI ratio without representing real positioning.
# Calibration reference (2026-07-02 live data): SNDK 1895C, 19 lots  -> ~$3.6M  (noise)
#                                               SNDK 2015C, 162 lots -> ~$32.6M (noise)
#                                               MU 1050C, 9220 lots  -> ~$968M  (signal)
unusual-activity.min-notional=50000000
# Cap on the returned list, sorted by ratio descending
unusual-activity.max-results=10

# Logging
logging.level.com.trading.marketdata.scraper=DEBUG
logging.level.com.trading.marketdata.service=INFO

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# Springdoc / Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.try-it-out-enabled=true

# Virtual threads (Java 21 + Spring Boot 3.2+)
spring.threads.virtual.enabled=true

# IBKR / IB Gateway
ibkr.host=127.0.0.1
ibkr.port=4001
ibkr.client-id=1
ibkr.connect-timeout-ms=5000
# How often the watchdog checks the connection and retries after a drop
ibkr.reconnect-interval-ms=30000
# Shorter, separate timeout for per-contract options activity scans (see IbkrMarketDataService) -
# a contract with genuinely zero open interest may never send an OI tick at all, so this is
# deliberately shorter than the main 15s quote/snapshot timeout to keep a multi-contract scan bounded
ibkr.contract-activity-timeout-seconds=2

# ---------------------------------------------------------------------------
# Persistence: snapshot history (MySQL on HOME-40)
# ---------------------------------------------------------------------------
# Master switch. Leave false until the datasource below is configured and the
# schema from docs/persistence-schema.sql has been applied once. With false the
# app runs exactly as before: derived metrics are still computed, delta fields
# stay null, nothing is written.
persistence.enabled=true
spring.datasource.url=jdbc:mysql://192.168.178.31:3306/marketdata?serverTimezone=UTC
spring.datasource.username=
spring.datasource.password=
# Never mutate or validate schema at startup: HOME-40 MySQL serves other
# projects, schema is applied manually via docs/persistence-schema.sql
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
# Do not fail startup when the DB is down - degrade to "no history" instead
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.connection-timeout=3000
spring.datasource.hikari.maximum-pool-size=4
