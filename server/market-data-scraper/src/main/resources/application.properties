server.port=8080
spring.application.name=market-data-scraper

# Scraper timeouts
scraper.connect-timeout-ms=3000
scraper.read-timeout-ms=5000
scraper.user-agent-rotate=true
scraper.rate-limit-delay-min-ms=500
scraper.rate-limit-delay-max-ms=1500

# Cache TTLs
cache.quote.ttl-seconds=60
cache.short.ttl-seconds=3600
cache.news.ttl-seconds=180
# conId is static per symbol - long TTL just to allow eventual self-healing
cache.ibkr-conid.ttl-seconds=604800
# Option chain (strikes/expiries) - rarely changes intraday
cache.option-chain.ttl-seconds=43200
# Open interest is published once/day before market open, does not update intraday
cache.option-oi.ttl-seconds=14400
# How long to remember a confirmed-invalid strike/expiry/right combo (IBKR error 200) before
# asking again — see OptionActivityService
cache.invalid-contract.ttl-seconds=3600
# Day memory of scanned strikes (keys embed the NY trading date, TTL just outlives a session)
cache.oi-day-memory.ttl-seconds=64800

# Unusual options activity (computed from IBKR structured data, see OptionActivityService)
# How many strikes nearest the current price to check (both calls and puts, so actual
# request count per scan = nearest-strikes * expiries * 2)
unusual-activity.nearest-strikes=16
# How many extra candidate strikes (beyond nearest-strikes) to pull before giving up — not
# every strike in the aggregate chain is actually listed for the nearest expiry (confirmed
# live: strikes only valid for other expirations get rejected with IBKR error 200), so this
# compensates by trying further candidates until nearest-strikes actually resolve
unusual-activity.strike-oversample-factor=3
# How many expiry boards to include
unusual-activity.expiries=2
# How the boards are chosen. "weekly-monthly" (default): slot 1 = nearest FRIDAY expiry
# (front weekly board), slot 2 = nearest standard monthly (third Friday; moves to the
# following monthly during expiration week), further slots chronological. "chronological"
# is the old first-N-by-date behavior — live 2026-07-06 it picked Fri+Mon (zero-OI Monday
# board, monthly invisible) for MU/AMD/INTC and 0DTE+Wednesday for AVGO, making the
# per-ticker numbers measure different regimes.
unusual-activity.expiry-selection=weekly-monthly
# Sticky day-memory: how many strikes outside the nearest-strikes window to keep re-scanning
# per expiry once they've been seen today, prioritized by last-seen total OI (heavy walls
# first). Keeps levels like the MU 950 put wall observable after price gaps away. 0 disables.
# Cost bound: 2 volume requests per extra strike per scan (OI comes from the option-oi cache).
unusual-activity.sticky-extra-strikes=8
# Flag a contract when today's volume / open interest exceeds this ratio
unusual-activity.min-volume-oi-ratio=1.0
# Minimum strike-referenced notional (volume * strike * 100, in USD) for a contract to be
# flagged as unusual. Filters ratio-only noise on illiquid contracts: a low-OI strike lets a
# handful of lots produce a high vol/OI ratio without representing real positioning.
# Calibration reference (2026-07-02 live data): SNDK 1895C, 19 lots  -> ~$3.6M  (noise)
#                                               SNDK 2015C, 162 lots -> ~$32.6M (noise)
#                                               MU 1050C, 9220 lots  -> ~$968M  (signal)
unusual-activity.min-notional=50000000
# Optional second gate on PREMIUM notional (volume * option price * 100, USD) — actual money
# spent, where strike notional overstates cheap OTM lottery tickets by up to ~100x. Premium
# basis: contract's last (untraded contracts: previous session's print), fallback bid/ask mid.
# 0 = off (default): calibrate against live premiumNotionalUsd values in the response first,
# then set. Fail-open: contracts without price ticks are flagged anyway, never suppressed.
unusual-activity.min-premium-notional=0
# Cap on the returned list, sorted by ratio descending
unusual-activity.max-results=10
# Aggressor classification (quote rule): a flagged contract's last print is located inside
# the bid/ask pair frozen at the moment the last tick arrived — AT_ASK (>=0.75 of spread,
# buyer-initiated), AT_BID (<=0.25, seller-initiated), MID between. A last print older than
# this many seconds (vs. its own IBKR trade timestamp, tick 45/88) is labeled STALE instead:
# the quote has moved on, locating an old print inside today's quote would fabricate a signal.
unusual-activity.aggressor-stale-seconds=300

# ---------------------------------------------------------------------------
# Market data Book (streaming last-value cache)
# ---------------------------------------------------------------------------
# Symbols with a permanent streaming subscription (one market-data line each).
book.watchlist=MU,SNDK,INTC,AVGO,MRVL,AMD
# Liveness anchor: ticks near-continuously in REGULAR, so its volume lastSeenAt measures
# whether the feed as a whole is alive. Subscribed in addition to the watchlist.
book.liveness-anchor=SPY
# Watchdog thresholds (only evaluated during REGULAR market state): anchor volume seen
# within N seconds = feed alive; another ticker's volume not seen for M seconds while the
# anchor is fresh = dead subscription, cancel + resubscribe (AUTO_RESUBSCRIBE log event).
book.anchor-fresh-seconds=10
book.ticker-stale-seconds=120
# How often the liveness watchdog evaluates the thresholds above.
book.watchdog-interval-ms=15000
# Backoff before retrying a subscription rejected with error 100 (pacing violation).
# Error 101 (max market-data lines) is deliberately NOT retried — see SubscriptionManager.
book.pacing-retry-delay-ms=5000
# Expected nightly IBC Gateway restart window (ET, HH:mm-HH:mm, may span midnight).
# Inside it the liveness watchdog stands down: the restart is routine, not a feed failure.
# Empty disables the window.
ibkr.expected-restart-window=23:45-00:20
# Test hooks (POST /api/v1/book/debug/kill/{ticker}) — keep off in production.
book.debug-endpoints-enabled=false
# Background UA/OI scanner: refreshes the Book's scan results for every watchlist symbol
# (the anchor carries no scan) so snapshot assembly never scans inline for them.
book.scan-initial-delay-ms=30000
book.scan-interval-ms=300000
# Non-watchlist tickers only: minimum age of the Book's scan result before an on-demand
# rescan (replaces the former 120s options cache — the Book itself is the dedupe now).
book.scan-refresh-seconds=120
# dataQuality staleness thresholds beyond the quote one (book.ticker-stale-seconds):
# IV/HV/option-volume ticks are sparser than trades; scan results age on their own clock.
book.metrics-stale-seconds=600
book.scan-stale-seconds=1800

# ---------------------------------------------------------------------------
# UA scan stage 2: per-contract aggressor classification from historical ticks
# ---------------------------------------------------------------------------
# Master switch. OFF by default: the stage consumes IBKR historical-data pacing budget
# (~60 requests/10min, BID_ASK counting DOUBLE) and stays opt-in until the live SPY
# verification (docs/ua-aggressor-stage2-prompt.md §7 phase 1) has been run here.
# With false, stage 1 behaves bit-for-bit as before.
ua.aggressor.enabled=true
# Escalation width: of the flagged UA entries, the top N by PREMIUM notional get the
# trade-by-trade analysis. Entries beyond N carry no profile; entries within N that hit
# the budget cap carry an explicit SKIPPED_BUDGET profile.
ua.aggressor.max-candidates-per-cycle=4
# Request-equivalents per scan cycle (one scheduled watchlist sweep shares one budget;
# an on-demand scan gets its own). One TRADES page = 1, one BID_ASK page = 2.
ua.aggressor.max-requests-per-cycle=20
# Timeout per reqHistoricalTicks page. Deliberately NOT the 2s contract-activity timeout:
# that one is calibrated for streaming-tick completion on a warm line; historical tick
# requests go to the historical-data farm and legitimately take several seconds.
ua.aggressor.request-timeout-seconds=15
# Sweep grouping window. Tick times have ONE-SECOND resolution, so 500ms effectively
# means "same second" — kept in ms so a future higher-resolution source slots in.
ua.aggressor.sweep-window-ms=500
# A single print at/above this many contracts is a block (counted regardless of its
# classification bucket — negotiated prints cluster at mid).
ua.aggressor.block-min-contracts=100
# Spread-leg markers matched (case-insensitive contains) against specialConditions.
# Exchange-dependent and poorly documented: this seeds with the documented
# single/multi-leg-of-combo mnemonics; refine from the UA_AGGRESSOR_CONDITIONS debug log
# during the first live sessions.
ua.aggressor.spread-condition-markers=SLAN,SLAI,SLCN,SLFT,MLET,MLAT,MLCT,MLFT,TLET,TLAT,TLCT,TLFT,MESL,TESL
# Historical window start (ET). Options print 09:30-16:15; useRth=0 keeps outliers.
ua.aggressor.session-start=09:30
# Per-contract OI day memory for the oiDelta join. 6 days: must outlive the 5-day
# lookback plus the partial write/read days (see CacheConfig — a 4-day TTL made lookback
# day 5 unreachable), and survives a long weekend plus one missed scan day.
cache.oi-contract-day-memory.ttl-seconds=518400

# ---------------------------------------------------------------------------
# Nasdaq auction / NOII data (IBKR Generic Tick 225 -> tick types 34/35/36/61)
# ---------------------------------------------------------------------------
# --- IBKR news (generic tick 292 on the Book lines) ---
# Article bodies are fetched via reqNewsArticle on headline arrival (one request per new
# article, deduped by articleId across tickers and reconnects).
news.article-fetch-enabled=true
# Bounded newest-first window per ticker in the Book (history lives in MySQL, as always).
news.max-items-per-ticker=25
# articleId -> body dedupe cache; past the cap it is dropped wholesale (a miss just refetches).
news.article-cache-max=200

auction.enabled=true
# Wall-clock gates in ET, deliberately wider than Nasdaq's dissemination windows
# (opening NOII from ~09:28, closing NOII from ~15:50) so clock skew can't clip real data.
# The 225 stream is permanently on (shared with the quote subscription); these windows gate
# INTERPRETATION, not requests. The standalone endpoint /api/v1/auction/{ticker}?force=true
# bypasses them and returns the raw Book state at any age.
auction.opening-window=09:20-09:36
auction.closing-window=15:45-16:02
# Auction ticks older than this do not count as current-window data (keeps opening-cross
# leftovers from masquerading as closing-cross data).
auction.max-age-seconds=180

# Logging
logging.level.com.trading.marketdata.scraper=DEBUG
logging.level.com.trading.marketdata.service=INFO

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# Springdoc / Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.try-it-out-enabled=true

# Virtual threads (Java 21 + Spring Boot 3.2+)
spring.threads.virtual.enabled=true

# IBKR / IB Gateway
ibkr.host=127.0.0.1
ibkr.port=4001
ibkr.client-id=1
ibkr.connect-timeout-ms=5000
# How often the watchdog checks the connection and retries after a drop
ibkr.reconnect-interval-ms=30000
# Shorter, separate timeout for per-contract options activity scans (see IbkrMarketDataService) -
# a contract with genuinely zero open interest may never send an OI tick at all, so this is
# deliberately shorter than the main 15s quote/snapshot timeout to keep a multi-contract scan bounded
ibkr.contract-activity-timeout-seconds=2

# ---------------------------------------------------------------------------
# Persistence: snapshot history (MySQL on HOME-40)
# ---------------------------------------------------------------------------
# Master switch. Leave false until the datasource below is configured and the
# schema from docs/persistence-schema.sql has been applied once. With false the
# app runs exactly as before: derived metrics are still computed, delta fields
# stay null, nothing is written.
persistence.enabled=true
spring.datasource.url=jdbc:mysql://192.168.178.31:3306/marketdata?serverTimezone=UTC
spring.datasource.username=
spring.datasource.password=
# Never mutate or validate schema at startup: HOME-40 MySQL serves other
# projects, schema is applied manually via docs/persistence-schema.sql
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
# Do not fail startup when the DB is down - degrade to "no history" instead.
# The Hikari setting alone is NOT enough for that: without an explicit dialect Hibernate
# probes JDBC metadata at boot and a dead/unauthorized DB kills the whole context
# (observed 2026-07-10 on a host without DB credentials). Pin the dialect and forbid the
# boot-time metadata probe so JPA initializes offline and every later DB access degrades
# per SnapshotPersistenceService's try/catch rules.
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.connection-timeout=3000
spring.datasource.hikari.maximum-pool-size=4
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
