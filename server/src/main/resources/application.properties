spring.data.rest.base-path=/api
server.address=0.0.0.0
server.forward-headers-strategy=framework
cors.allowed-origins=http://localhost:4200,http://192.168.178.80:4200,https://ngstocks.com

# JWT signing key shared with independently deployed services such as market-data-scraper.
# Must be provided by the Tomcat/runtime environment; there is intentionally no fallback secret.
jones.app.jwtSecret=${JONES_JWT_SECRET}

# OpenAPI/Swagger configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.doc-expansion=none

# MariaDB Database configuration
spring.datasource.url=jdbc:mariadb://192.168.178.31:3306/StocksDB?allowPublicKeyRetrieval=true
spring.datasource.driverClassName=org.mariadb.jdbc.Driver
spring.datasource.username=stocksdb
spring.datasource.password=stocksdb
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=never

# Scheduler Configuration
# Updater Service (Daily at 7:30 AM)
updater.schedule.cron=0 30 7 * * ?
updater.schedule.zone=Europe/Berlin
